services:
  neko:
    build:
      context: .
      dockerfile: Dockerfile.browser-harness
      args:
        NEKO_VERSION: "3.1.4"
    image: "neko-browser-harness:3.1.4"
    restart: "unless-stopped"
    shm_size: "2gb"
    env_file:
      - "./local.env"
    ports:
      - "8080:8080"
      # Browser Harness only. Never expose the CDP endpoint publicly.
      - "127.0.0.1:9223:9222"
      - "52000-52100:52000-52100/udp"
